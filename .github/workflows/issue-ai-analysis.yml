name: Issue AI Analysis

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze'
        required: true
        type: number

jobs:
  request-analysis:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_KEY }}
    steps:
      - name: Determine issue number
        id: number
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ISSUE_NUMBER=${{ github.event.inputs.issue_number }}" >> $GITHUB_ENV
          else
            echo "Unknown trigger" && exit 1
          fi

      - name: Request AI Analysis
        shell: bash
        run: |
          curl --request POST \
            --url https://api.cursor.com/v0/agents \
            -u ${{ secrets.CURSOR_KEY }}: \
            --header 'Content-Type: application/json' \
            --data '{
            "prompt": {
              "text": "请仔细阅读 ISSUE（#${{ env.ISSUE_NUMBER }}）的讨论内容，理解其中涉及的功能或问题。随后，在项目代码中定位与该功能相关的文件或代码段，并使用 `git blame` 查找最近修改过该部分代码的三位贡献者（按提交时间倒序排列）。最后，请评论回复该 ISSUE，输出一个简洁的分析结论，并 @ 这三位贡献者，礼貌地请求他们协助排查问题。"
            },
            "model": "default",
            "source": {
              "repository": "https://github.com/MaaEnd/MaaEnd"
            }
          }'
