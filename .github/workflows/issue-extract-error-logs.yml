# 提取 Issue 中的日志链接并评论错误片段；若配置了 COPILOT_PAT，会调用 Copilot CLI 分析可能出问题的任务及失败原因（结合 assets/resource/pipeline 中的任务定义）。
# Token：需在仓库或组织中添加 secret COPILOT_PAT，为带 “Copilot Requests” 权限的 fine-grained PAT。见 https://docs.github.com/en/copilot/how-tos/copilot-cli/automate-with-actions
name: Issue Extract Error Logs

on:
  issues:
    types: [opened]

jobs:
  extract-error-logs:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract error log blocks
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import zipfile
          from pathlib import Path
          from urllib.parse import unquote, urlparse
          from urllib.request import Request, urlopen

          CONTEXT_LINES = 20
          MAX_DOWNLOAD_BYTES = 50 * 1024 * 1024  # 50 MB
          MAX_COMMENT_LENGTH = 62000
          REQUEST_TIMEOUT_SECONDS = 20
          DOWNLOAD_CHUNK_SIZE = 1024 * 1024
          MAX_LOG_FILE_BYTES = 20 * 1024 * 1024
          ALLOWED_HOSTS = {
              "github.com",
              "objects.githubusercontent.com",
              "github-production-user-asset-6210df.s3.amazonaws.com",
          }

          issue_body = os.environ.get("ISSUE_BODY") or ""
          github_output = Path(os.environ["GITHUB_OUTPUT"])

          all_urls = re.findall(r"https?://[^\s)\]>\"]+", issue_body)
          log_urls = []
          for raw_url in all_urls:
              parsed = urlparse(raw_url)
              basename = Path(unquote(parsed.path)).name
              hostname = (parsed.hostname or "").lower()
              is_allowed_host = (
                  hostname in ALLOWED_HOSTS
                  or hostname.endswith(".githubusercontent.com")
              )
              is_target_zip = basename.lower().endswith(".zip")
              if (
                  basename.startswith("MaaEnd-logs-v")
                  and is_target_zip
                  and parsed.scheme == "https"
                  and is_allowed_host
              ):
                  log_urls.append(raw_url)

          # 去重并保持出现顺序
          unique_urls = list(dict.fromkeys(log_urls))

          lines = [
              "### 自动提取日志中的错误片段",
              "",
          ]

          workdir = Path("_issue-log-artifacts")
          workdir.mkdir(parents=True, exist_ok=True)

          def download_zip(url: str, target_path: Path):
              request = Request(
                  url,
                  headers={"User-Agent": "MaaEnd-Issue-Log-Extractor"},
              )
              with urlopen(request, timeout=REQUEST_TIMEOUT_SECONDS) as response:
                  content_length = response.headers.get("Content-Length")
                  if content_length and int(content_length) > MAX_DOWNLOAD_BYTES:
                      raise ValueError("日志压缩包体积超过限制")

                  total = 0
                  with target_path.open("wb") as fp:
                      while True:
                          chunk = response.read(DOWNLOAD_CHUNK_SIZE)
                          if not chunk:
                              break
                          total += len(chunk)
                          if total > MAX_DOWNLOAD_BYTES:
                              raise ValueError("日志压缩包体积超过限制")
                          fp.write(chunk)

          def extract_zip_safely(zip_path: Path, extract_dir: Path):
              root_dir = extract_dir.resolve()
              with zipfile.ZipFile(zip_path) as zf:
                  for member in zf.infolist():
                      member_path = Path(member.filename)
                      resolved_member_path = (extract_dir / member_path).resolve()
                      try:
                          resolved_member_path.relative_to(root_dir)
                      except ValueError as exc:
                          raise ValueError(f"压缩包包含不安全路径: {member.filename}") from exc
                      zf.extract(member, extract_dir)

          def extract_blocks(log_text: str):
              source_lines = log_text.splitlines()
              intervals = []
              for idx, content in enumerate(source_lines):
                  if "[ERR]" in content:
                      start = max(0, idx - CONTEXT_LINES)
                      end = min(len(source_lines) - 1, idx + CONTEXT_LINES)
                      intervals.append((start, end))

              if not intervals:
                  return []

              intervals.sort()
              merged_intervals = [list(intervals[0])]
              for start, end in intervals[1:]:
                  last = merged_intervals[-1]
                  if start <= last[1] + 1:
                      last[1] = max(last[1], end)
                  else:
                      merged_intervals.append([start, end])

              blocks = []
              for start, end in merged_intervals:
                  blocks.append("\n".join(source_lines[start : end + 1]))
              return blocks

          if not unique_urls:
              with github_output.open("a", encoding="utf-8") as fp:
                  fp.write("has-content=false\n")
              sys.exit(0)

          has_error_blocks = False
          all_blocks_for_copilot = []
          for index, url in enumerate(unique_urls, 1):
              lines.append(f"#### 日志链接 {index}")
              lines.append(url)
              lines.append("")

              zip_path = workdir / f"log-{index}.zip"
              extract_dir = workdir / f"log-{index}"
              extract_dir.mkdir(parents=True, exist_ok=True)

              try:
                  download_zip(url, zip_path)
              except Exception as exc:
                  lines.append(f"下载失败：`{exc}`")
                  lines.append("")
                  continue

              try:
                  extract_zip_safely(zip_path, extract_dir)
              except Exception as exc:
                  lines.append(f"解压失败：`{exc}`")
                  lines.append("")
                  continue

              for log_name in ("maa.log", "maa.bak.log"):
                  matched_files = [
                      p
                      for p in extract_dir.rglob(log_name)
                      if p.is_file()
                  ]
                  if not matched_files:
                      lines.append(f"- 未找到 `{log_name}`")
                      continue

                  for file_idx, file_path in enumerate(matched_files, 1):
                      if file_path.stat().st_size > MAX_LOG_FILE_BYTES:
                          lines.append(
                              f"- `{log_name}`（第 {file_idx} 个）体积过大，已跳过解析"
                          )
                          continue

                      try:
                          text = file_path.read_text(
                              encoding="utf-8",
                              errors="backslashreplace",
                          )
                      except Exception as exc:
                          lines.append(
                              f"- 读取 `{log_name}` 失败（第 {file_idx} 个）：`{exc}`"
                          )
                          continue

                      blocks = extract_blocks(text)
                      if not blocks:
                          lines.append(
                              f"- `{log_name}`（第 {file_idx} 个）中未找到 `[ERR]`"
                          )
                          continue

                      for block_idx, block in enumerate(blocks, 1):
                          has_error_blocks = True
                          all_blocks_for_copilot.append(block)
                          title = f"{log_name}（第 {file_idx} 个）错误块 {block_idx}"
                          lines.append("<details>")
                          lines.append(f"<summary>##### {title}</summary>")
                          lines.append("")
                          lines.append("```log")
                          lines.append(block)
                          lines.append("```")
                          lines.append("")
                          lines.append("</details>")
                          lines.append("")

              lines.append("")

          comment = "\n".join(lines).strip() + "\n"
          if len(comment) > MAX_COMMENT_LENGTH:
              truncated_comment = comment[:MAX_COMMENT_LENGTH]
              has_unclosed_fence = False
              for line in truncated_comment.splitlines():
                  stripped = line.strip()
                  if stripped.startswith("```"):
                      has_unclosed_fence = not has_unclosed_fence
              if has_unclosed_fence:
                  truncated_comment += "\n```\n"
              comment = (
                  truncated_comment
                  + "\n\n> 输出过长，已截断。请下载日志文件查看完整内容。\n"
              )

          comment_file = Path("issue-log-comment.md")
          comment_file.write_text(comment, encoding="utf-8")

          if all_blocks_for_copilot:
              err_blocks_file = Path("err-blocks-for-copilot.txt")
              err_blocks_file.write_text(
                  "\n\n---BLOCK---\n\n".join(all_blocks_for_copilot),
                  encoding="utf-8",
              )

          has_code_block = "```log" in comment and has_error_blocks
          with github_output.open("a", encoding="utf-8") as fp:
              fp.write(f"has-content={'true' if has_code_block else 'false'}\n")
          PY

      - name: Analyze errors with Copilot CLI and pipeline lookup
        id: analyze
        if: steps.extract.outputs.has-content == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          npm install -g @github/copilot
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          err_file = Path("err-blocks-for-copilot.txt")
          if not err_file.exists() or err_file.stat().st_size == 0:
              Path("analysis.md").write_text("", encoding="utf-8")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has-analysis=false\n")
              raise SystemExit(0)

          err_text = err_file.read_text(encoding="utf-8")[:25000]
          prompt = """Below are Maa log error snippets (separated by ---BLOCK---). This repo has task definitions in assets/resource/pipeline (JSON files; each key is a task name). For each block: 1) list possible task names involved; 2) find the task in pipeline and suggest a brief failure reason (可能原因) based on task's desc, recognition, action, expected. Output in Markdown. Use heading '### 可能原因分析' and write in Chinese.

          ---ERROR BLOCKS---

          """ + err_text

          try:
              r = subprocess.run(
                  ["copilot", "-p", prompt],
                  capture_output=True,
                  text=True,
                  timeout=120,
                  env={**os.environ},
              )
              out = (r.stdout or "").strip() or (r.stderr or "").strip()
          except Exception as e:
              out = str(e)
          Path("analysis.md").write_text(out, encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("has-analysis=true\n" if out else "has-analysis=false\n")
          PY
        continue-on-error: true

      - name: Comment extracted blocks to issue
        if: steps.extract.outputs.has-content == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body = fs.readFileSync('issue-log-comment.md', 'utf8');
            try {
              const analysis = fs.readFileSync('analysis.md', 'utf8').trim();
              if (analysis && (analysis.includes('可能原因') || analysis.includes('###'))) {
                body = body + '\n\n' + analysis;
              }
            } catch (_) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
